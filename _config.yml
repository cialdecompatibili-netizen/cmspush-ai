title: AI_TITLE
baseurl: "/cmspush-ai"
url: "https://cialdecompatibili-netizen.github.io"
description: AI_DESCRIPTION
minimal_mistakes_skin: default
search: true
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
exclude:
  - vendor
timezone:
include:
  - _pages
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
author:
  name: AI_AUTHOR_NAME
  avatar: "/assets/images/bio-photo.jpg"
  bio: AI_AUTHOR_BIO
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: ""
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: ""
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: ""
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
permalink: /:categories/:title/